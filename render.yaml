services:
  - type: web
    name: emotional-podcast-rag
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.12"
    healthCheckPath: /health
    autoDeploy: true
